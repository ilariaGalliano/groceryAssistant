<div class="min-h-screen bg-stone-50">
  <!-- Header -->
  @if (authService.isLoggedIn()) {
  <header class="bg-emerald-800 text-white shadow-lg">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="assets/logo2.png" alt="FoodEasyList" class="h-10 w-auto rounded bg-white/90 p-1">
      </div>
      <nav class="flex gap-1 items-center">
        <a routerLink="/recipes" routerLinkActive="bg-emerald-900"
           class="hover:bg-emerald-700 rounded-lg px-3 py-2 transition text-lg" title="Ricette">
          🍳
        </a>
        <a routerLink="/weekly" routerLinkActive="bg-emerald-900"
           class="hover:bg-emerald-700 rounded-lg px-3 py-2 transition text-lg" title="Settimana">
          🗓️ 
        </a>
        <a routerLink="/shopping-list" routerLinkActive="bg-emerald-900"
           class="hover:bg-emerald-700 rounded-lg px-3 py-2 transition text-lg" title="Lista Spesa">
          🛒
        </a>
        <button (click)="logout()" class="ml-3 hover:bg-emerald-700 rounded-lg px-3 py-2 transition text-lg" title="Esci">
          🚪
        </button>
      </nav>
    </div>
  </header>
  }

  <!-- Content -->
  <main class="max-w-4xl mx-auto px-4 py-8">
    <router-outlet />
  </main>
</div>
