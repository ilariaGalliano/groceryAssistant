<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-md bg-white/80 backdrop-blur-sm rounded-2xl shadow-sm border border-stone-200 p-8">
    <div class="text-center mb-8">
      <img src="assets/logo2.png" alt="FoodEasyList" class="h-40 mx-auto">
      <p class="text-stone-500 text-sm mt-1">
        @if (isRegister()) { Crea il tuo account } @else { Accedi al tuo account }
      </p>
    </div>

    @if (error()) {
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="submit()" class="space-y-4">
      @if (isRegister()) {
        <div>
          <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-1 block">Nome</label>
          <input
            type="text"
            [(ngModel)]="name"
            name="name"
            placeholder="Il tuo nome..."
            class="w-full border border-stone-200 rounded-lg px-4 py-2.5 text-sm bg-white focus:ring-2 focus:ring-emerald-400 focus:border-transparent placeholder:text-stone-300"
          />
        </div>
      }

      <div>
        <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-1 block">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          required
          class="w-full border border-stone-200 rounded-lg px-4 py-2.5 text-sm bg-white focus:ring-2 focus:ring-emerald-400 focus:border-transparent placeholder:text-stone-300"
        />
      </div>

      <div>
        <label class="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-1 block">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          minlength="6"
          class="w-full border border-stone-200 rounded-lg px-4 py-2.5 text-sm bg-white focus:ring-2 focus:ring-emerald-400 focus:border-transparent placeholder:text-stone-300"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-2.5 bg-emerald-700 text-white rounded-lg font-medium hover:bg-emerald-800 transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        @if (loading()) {
          <span class="inline-block animate-spin mr-2">⏳</span> Caricamento...
        } @else if (isRegister()) {
          Registrati
        } @else {
          Accedi
        }
      </button>
    </form>

    <div class="mt-6 text-center">
      <button
        type="button"
        (click)="toggleMode()"
        class="text-sm text-emerald-700 hover:text-emerald-800 font-medium"
      >
        @if (isRegister()) {
          Hai già un account? Accedi
        } @else {
          Non hai un account? Registrati
        }
      </button>
    </div>
  </div>
</div>
